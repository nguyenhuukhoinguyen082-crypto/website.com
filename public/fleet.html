<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet — Vietnam Airlines Group | PTFS</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="fleet">

<div id="header-slot"></div>

<section class="hero" style="padding:64px 0 90px;">
  <div class="hero-inner">
    <p class="eyebrow">Our Fleet</p>
    <h1>Built for every distance</h1>
    <p class="hero-sub">Fleet data below is synced from the Vietnam Airlines Group management database.</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <p class="data-note">Live fleet counts and seat configurations are managed from the staff dashboard and update automatically here.</p>
    <div id="fleetGrid" class="grid grid-3" style="margin-top:28px;"></div>
  </div>
</section>

<div id="footer-slot"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/main.js"></script>
<script>
(async function () {
  const fleet = await VNA_DATA.getFleet();
  document.getElementById('fleetGrid').innerHTML = fleet.map(a => `
    <div class="card">
      <img src="${a.image}" alt="${a.name}">
      <p class="tag">${a.count} aircraft in service</p>
      <h3>${a.name}</h3>
      <p>${a.role} · Range ${a.range}</p>
      <hr class="divider" style="margin:14px 0;">
      <table style="box-shadow:none;">
        <tr><td>Economy</td><td>${a.seats.economy}</td></tr>
        <tr><td>Premium Economy</td><td>${a.seats.premiumEconomy}</td></tr>
        <tr><td>Business</td><td>${a.seats.business}</td></tr>
      </table>
    </div>`).join('');
})();
</script>
</body>
</html>
