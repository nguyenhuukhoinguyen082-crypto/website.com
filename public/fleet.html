<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet — Vietnam Airlines Group | PTFS</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .fleet-row { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; padding: 56px 0; border-bottom: 1px solid var(--color-line); }
  .fleet-row:last-child { border-bottom: none; }
  .fleet-row.reverse .fleet-media { order: 2; }
  .fleet-media img { width: 100%; border-radius: var(--radius-md); box-shadow: var(--shadow-md); display: block; }
  .fleet-specs { display: flex; gap: 28px; margin-top: 20px; flex-wrap: wrap; }
  .fleet-specs div { min-width: 110px; }
  .fleet-specs .num { font-family: var(--font-display); font-weight: 800; font-size: 1.4rem; color: var(--color-primary); }
  .fleet-specs .lbl { font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-slate-light); }
  @media (max-width: 800px) {
    .fleet-row, .fleet-row.reverse { grid-template-columns: 1fr; }
    .fleet-row.reverse .fleet-media { order: 0; }
  }
</style>
</head>
<body data-page="fleet">

<div id="header-slot"></div>

<section class="hero" style="padding:64px 0 90px;">
  <div class="hero-inner">
    <p class="eyebrow">Our Fleet</p>
    <h1>Our Fleet</h1>
    <p class="hero-sub">This is all of the aircraft that we are currently operating at Vietnam Airlines.</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div id="fleetList"></div>
  </div>
</section>

<div id="footer-slot"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/main.js"></script>
<script>
(async function () {
  const fleet = await VNA_DATA.getFleet();
  document.getElementById('fleetList').innerHTML = fleet.map((a, i) => `
    <div class="fleet-row ${i % 2 === 1 ? 'reverse' : ''}">
      <div class="fleet-media">
        <img src="${a.image}" alt="${a.name}">
      </div>
      <div>
        <p class="tag tag-teal">${a.count} in service</p>
        <h2>${a.name}</h2>
        <p>${a.role}</p>
        <div class="fleet-specs">
          <div><div class="num">${a.seats.economy}</div><div class="lbl">Economy</div></div>
          ${a.seats.premiumEconomy ? `<div><div class="num">${a.seats.premiumEconomy}</div><div class="lbl">Premium Econ.</div></div>` : ''}
          <div><div class="num">${a.seats.business}</div><div class="lbl">Business</div></div>
          <div><div class="num">${a.range}</div><div class="lbl">Range</div></div>
        </div>
      </div>
    </div>`).join('');
})();
</script>
</body>
</html>
