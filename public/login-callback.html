<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signing in… — Vietnam Airlines Group | PTFS</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="login-callback">

<div id="header-slot"></div>

<section class="section" style="padding:100px 0;">
  <div class="container center" style="max-width:480px;">
    <h2 id="statusHeading">Signing you in…</h2>
    <p id="statusText">Verifying your Discord account.</p>
  </div>
</section>

<div id="footer-slot"></div>
<script src="assets/js/config.js"></script>
<script src="assets/js/main.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');

if (code) {
  // Hand the code to the backend, which exchanges it with Discord,
  // checks server roles, and sets a session cookie — then redirects home.
  window.location.href = '/api/auth/discord?code=' + encodeURIComponent(code);
} else {
  document.getElementById('statusHeading').textContent = 'Sign-in failed';
  document.getElementById('statusText').textContent = 'No authorization code was returned by Discord. Please try signing in again.';
}
</script>
</body>
</html>
